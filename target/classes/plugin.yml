name: FakeDeathBan
version: 1.8-pre3
load: STARTUP
main: cz.sk.corrupted.universe.fakeDeathBan.FakeDeathBan
api-version: 1.21
author: sazenice
website: https://github.com/sazenice/FakeDeathBan

commands:
  undeathban:
    description: "Teleportuje všechny hráče s death banem k tobě a odstraní jim deathban"
    usage: /<command> [hráč...]
    aliases:
      - udb
      - undb
      - udban
      - udeathb
      - undeathb
      - undban
      - udeathban
    permission: fakedeathban.undeathban
  setspectate:
    description: "Nastaví hráče, který se bude spectatovat když někdo má deathban"
    usage: /<command> <hráč>
    aliases:
      - sets
      - setspec
      - sspec
      - ss
    permission: fakedeathban.setspectate
  spectate:
    description: "Nastaví hráče, který se bude spectatovat když ty máš deathban"
    usage: /<command> <hráč>
    aliases:
      - spec
      - s
    permission: fakedeathban.spectate
  freeze:
    description: "Zmrazí všechny hráče, co mají deathban"
    usage: /<command> [hráč...]
    aliases:
      - fr
    permission: fakedeathban.freeze
  defaultgamemode:
    description: "Nastaví výchozí gamemode pro hráče, kterým se odstraní deathban"
    usage: /<command> <gamemode>
    aliases:
      - defg
      - dgamemode
      - defaultg
      - dg
    permission: fakedeathban.defaultgamemode
  unfreeze:
    description: "Rozmrazí všechny hráče, co jsou zmraženi"
    usage: /<command> [hráč...]
    aliases:
      - unfr
    permission: fakedeathban.unfreeze
  version:
    description: "Ukáže informace o pluginu"
    usage: /<command>
    permission: fakedeathban.version
  check:
    description: "Zjistí, zda všechny proměné, co mají být v config.yml existují"
    usage: /<command>
    aliases:
      - health
      - chk
    permission: fakedeathban.check
  setsound:
    description: "Nastaví zvuk když někdo umře nebo se oživí"
    usage: /<command> <death|revive> <sound>
    permission: fakedeathban.setsound
  pre-start:
    description: "Nastaví režim pre-start"
    usage: /<command>
    permission: fakedeathban.pre-start
    aliases:
      - ps
  setimmunity:
    description: "Nastaví hráči imunitu"
    usage: /<command> <hráč> <imunita>
    permission: fakedeathban.setimmunity
    aliases:
      - setimmune
      - setim
      - simmune
      - sim
  togglefdb:
    description: "Vypne nebo zapne posluchače"
    usage: /<command>
    permission: fakedeathban.togglefdb
permissions:
  # Příkazové oprávnění
  fakedeathban.undeathban:
    default: op
  fakedeathban.setspectate:
    default: op
  fakedeathban.spectate:
    default: true
  fakedeathban.freeze:
    default: op
  fakedeathban.defaultgamemode:
    default: op
  fakedeathban.unfreeze:
    default: op
  fakedeathban.version:
    default: true
  fakedeathban.check:
    default: op
  fakedeathban.setsound:
    default: op
  fakedeathban.pre-start:
    default: op
  fakedeathban.setimmunity:
    default: op
  fakedeathban.togglefdb:
    default: op
  # Imunitní oprávnění
  fakedeathban.bypass.deathban:
    description: Imunita proti DeathBanu
    default: false
  fakedeathban.bypass.freeze:
    description: Imunita proti zmražení
    default: false
  fakedeathban.bypass.joinquit:
    description: Ukazování Join/Quit zpráv
    default: false
  fakedeathban.bypass.move:
    description: Možnost pohybovat se s DeathBanem
    default: false
  fakedeathban.bypass.pre-start:
    description: Automatické odstranění režimu pre-start
    default: op