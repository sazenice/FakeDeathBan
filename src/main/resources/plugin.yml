name: FakeDeathBan
version: 1.8-pre5
load: STARTUP
main: cz.sk.corrupted.universe.fakeDeathBan.FakeDeathBan
api-version: 1.21
author: sazenice
website: https://github.com/sazenice/FakeDeathBan

commands:
  undeathban:
    description: "Revives and teleports all players to you"
    usage: /<command> [player...]
    aliases:
      - udb
      - undb
      - udban
      - udeathb
      - undeathb
      - undban
      - udeathban
    permission: fakedeathban.undeathban
  setspectate:
    description: "Sets the default spectator"
    usage: /<command> <player>
    aliases:
      - sets
      - setspec
      - sspec
      - ss
    permission: fakedeathban.setspectate
  spectate:
    description: "Spectates a player"
    usage: /<command> <player>
    aliases:
      - spec
      - s
    permission: fakedeathban.spectate
  freeze:
    description: "Freezes a player"
    usage: /<command> [player...]
    aliases:
      - fr
    permission: fakedeathban.freeze
  defaultgamemode:
    description: "Sets the default gamemode after a revive"
    usage: /<command> <gamemode>
    aliases:
      - defg
      - dgamemode
      - defaultg
      - dg
    permission: fakedeathban.defaultgamemode
  unfreeze:
    description: "Unfreezes a player"
    usage: /<command> [player...]
    aliases:
      - unfr
    permission: fakedeathban.unfreeze
  version:
    description: "Shows the plugin information"
    usage: /<command>
    permission: fakedeathban.version
  check:
    description: "Checks if all variables exist in config.yml"
    usage: /<command>
    aliases:
      - health
      - chk
    permission: fakedeathban.check
  setsound:
    description: "Sets the sound after a death/revive"
    usage: /<command> <death|revive> <sound>
    permission: fakedeathban.setsound
  immortality:
    description: "Sets the immortality mode"
    usage: /<command>
    permission: fakedeathban.immortality
  setimmunity:
    description: "Adds immunity to a player"
    usage: /<command> <player> <immunity>
    permission: fakedeathban.setimmunity
    aliases:
      - setimmune
      - setim
      - simmune
      - sim
  togglefdb:
    description: "Turns listeners on or off"
    usage: /<command>
    permission: fakedeathban.togglefdb
  gui:
    description: "Shows a GUI for FakeDeathBan"
    usage: /<command>
    permission: fakedeathban.gui
    aliases:
      - menu
      - open
  language:
    description: "Changes the language"
    usage: /<command> <language>
    permission: fakedeathban.language
    aliases:
      - lang
      - lng
      - lg
  banlist:
    description: Shows deathbanned players
    usage: /<command>
    permission: fakedeathban.banlist
permissions:
  # Příkazové oprávnění
  fakedeathban.undeathban:
    default: op
  fakedeathban.setspectate:
    default: op
  fakedeathban.spectate:
    default: true
  fakedeathban.freeze:
    default: op
  fakedeathban.defaultgamemode:
    default: op
  fakedeathban.unfreeze:
    default: op
  fakedeathban.version:
    default: true
  fakedeathban.check:
    default: op
  fakedeathban.setsound:
    default: op
  fakedeathban.immortality:
    default: op
  fakedeathban.setimmunity:
    default: op
  fakedeathban.togglefdb:
    default: op
  fakedeathban.gui:
    default: op
  fakedeathban.language:
    default: op
  fakedeathban.banlist:
    default: op
  # Imunitní oprávnění
  fakedeathban.bypass.deathban:
    description: Immunity against DeathBanu
    default: false
  fakedeathban.bypass.freeze:
    description: Immunity against freezes
    default: false
  fakedeathban.bypass.joinquit:
    description: Immunity for Join/Quit messages
    default: false
  fakedeathban.bypass.move:
    description: Immunity for movement
    default: false
  fakedeathban.bypass.immortality:
    description: Immunity against immortality mode
    default: op